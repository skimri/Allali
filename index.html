<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Allali | Illustrator</title>
  <meta name="description" content="Portfolio of Laura Allali, illustrator. Artwork, projects, and contact." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;500;600;700&family=Manrope:wght@400;500;700&family=Caveat:wght@500;700&family=Kalam:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="site-header" aria-label="Primary navigation">
    <p class="logo">Laura Allali <span>Illustrator</span></p>
    <nav>
      <a href="#gallery">Gallery</a>
      <a href="about/index.html">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <img src="https://picsum.photos/seed/laura-header-illustration/1800/680" alt="Temporary hero artwork placeholder" loading="eager" />
    </section>

    <section class="gallery" id="gallery" aria-label="Artwork gallery">
      <div class="gallery-heading">
        <h2>Browse Galleries</h2>
        <p>Select a category to view its full image gallery.</p>
      </div>

      <div class="art-grid">
        <a class="tile gallery-link" href="gallery/gallery-page5.html" aria-label="Open portraits gallery">
          <img src="https://picsum.photos/seed/laura-portraits-cover/800/800" alt="Portraits gallery cover" loading="lazy" />
          <span>Portraits</span>
        </a>
        <a class="tile gallery-link" href="gallery/gallery-page3.html" aria-label="Open editorial gallery">
          <img src="https://picsum.photos/seed/laura-editorial-cover/800/800" alt="Editorial gallery cover" loading="lazy" />
          <span>Editorial</span>
        </a>
        <a class="tile gallery-link" href="gallery/gallery-page2.html" aria-label="Open children books gallery">
          <img src="https://picsum.photos/seed/laura-children-cover/800/800" alt="Children books gallery cover" loading="lazy" />
          <span>Children Books</span>
        </a>
        <a class="tile gallery-link" href="gallery/gallery-page1.html" aria-label="Open character design gallery">
          <img src="https://picsum.photos/seed/laura-character-cover/800/800" alt="Character design gallery cover" loading="lazy" />
          <span>Character Design</span>
        </a>
        <a class="tile gallery-link" href="gallery/gallery-page4.html" aria-label="Open nature studies gallery">
          <img src="https://picsum.photos/seed/laura-nature-cover/800/800" alt="Nature studies gallery cover" loading="lazy" />
          <span>Nature Studies</span>
        </a>
        <a class="tile gallery-link" href="gallery/gallery-page6.html" aria-label="Open sketchbook gallery">
          <img src="https://picsum.photos/seed/laura-sketchbook-cover/800/800" alt="Sketchbook gallery cover" loading="lazy" />
          <span>Sketchbook</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>Laura Allali • Illustrator • Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
