<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Allali | Illustrator</title>
  <meta name="description" content="Portfolio of Laura Allali, illustrator. Artwork, projects, and contact." />
  <link rel="icon" type="image/png" href="assets/ico.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="site-header" aria-label="Primary navigation">
    <a class="logo" href="index.html" aria-label="Laura Allali home">
      <img class="logo-icon" src="assets/ico-transparent.png" alt="" aria-hidden="true" />
      <span class="logo-text">Laura Allali <span>Illustrator Portfolio</span></span>
    </a>
    <nav>
      <a href="#gallery">Gallery</a>
      <a href="about/index.html">About</a>
      <a href="contact/index.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <img src="assets/img/LUCA 1st year (self-portrait series)/Graphite - Colored pencils/IMG_0634.JPG.jpg" alt="Featured artwork by Laura Allali" loading="eager" />
    </section>

    <section class="gallery" id="gallery" aria-label="Artwork gallery">
      <div class="gallery-heading">
        <h2>Browse Galleries</h2>
        <p>Explore every artwork grouped by school year and series.</p>
      </div>

      <div class="art-grid">
        <a class="tile gallery-link" href="gallery/De!-Kunsthumaniora-Antwerpen/index.html" aria-label="Open De Kunsthumaniora Antwerpen gallery">
          <img src="assets/img/De! Kunsthumaniora Antwerpen/Graphite - Charcoal/IMG_0689.JPG.jpg" alt="De Kunsthumaniora Antwerpen gallery cover" loading="lazy" />
          <span>De! Kunsthumaniora Antwerpen(2019-2023)</span>
        </a>
        <a class="tile gallery-link" href="gallery/LUCA-1st-year/index.html" aria-label="Open LUCA 1st year self-portrait series gallery">
          <img src="assets/img/LUCA 1st year (self-portrait series)/Graphite - Colored pencils/IMG_0634.JPG.jpg" alt="LUCA 1st year self-portrait series gallery cover" loading="lazy" />
          <span>LUCA 1st year (2023-2024)</span>
        </a>
        <a class="tile gallery-link" href="gallery/LUCA-2nd-year/index.html" aria-label="Open LUCA 2nd year gallery">
          <img src="assets/img/LUCA 2nd year/Linograph (Tijl Uilenspiegel exhibition)/IMG_0690.JPG.jpg" alt="LUCA 2nd year gallery cover" loading="lazy" />
          <span>LUCA 2nd year(2024-2025)</span>
        </a>
        <a class="tile gallery-link" href="gallery/Model-Drawing/index.html" aria-label="Open model drawing gallery">
          <img src="assets/img/Model drawing/IMG_0668.JPG-cover.png" alt="Model drawing gallery cover" loading="lazy" />
          <span>Model drawing</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>Laura Allali • Illustrator • Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
